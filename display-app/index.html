<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Token Display — Fly Dubai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="preconnect" href="https://www.gstatic.com" crossorigin>
<!-- Load fonts + icons WITHOUT blocking the page render -->
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" onload="this.onload=null;this.rel='stylesheet'">
<link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.44.0/dist/tabler-icons.min.css" onload="this.onload=null;this.rel='stylesheet'">
<noscript>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.44.0/dist/tabler-icons.min.css">
</noscript>
<style>
:root {
  --brand: #0e7490; --brand2: #0891b2;
  --bg: #eef2f7; --panel: #ffffff; --panel2: #f1f5f9;
  --border: #e2e8f0; --text: #0f172a; --muted: #64748b; --muted2: #94a3b8;
  --success: #15803d; --warning: #d97706; --danger: #dc2626; --pending: #7c3aed;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text);
  width:100vw; height:100vh; -webkit-font-smoothing:antialiased; user-select:none;
}
.badge { display:inline-flex; align-items:center; gap:7px; padding:6px 16px; border-radius:999px; font-size:20px; font-weight:700; }
.badge.it { background:rgba(56,189,248,.16); color:#7dd3fc; }
.badge.outlook { background:rgba(74,222,128,.16); color:var(--success); }
.badge.hardware { background:rgba(251,191,36,.16); color:var(--warning); }
.badge.laptop { background:rgba(167,139,250,.16); color:var(--pending); }
.badge.other { background:rgba(148,163,184,.16); color:#cbd5e1; }

/* Header */
header {
  height:70px; display:flex; align-items:center; justify-content:space-between;
  padding:0 36px; border-bottom:1px solid var(--border); background:var(--panel);
}
.h-left { display:flex; align-items:center; gap:14px; }
.h-logo { width:44px; height:44px; border-radius:50%; background:linear-gradient(135deg,var(--brand),var(--brand2)); color:#fff; display:flex; align-items:center; justify-content:center; font-size:24px; }
.h-left h1 { font-size:22px; font-weight:800; }
.h-center { font-size:20px; font-weight:800; letter-spacing:4px; color:var(--brand); }
.h-right { text-align:right; }
.h-right .clock { font-size:26px; font-weight:800; font-variant-numeric:tabular-nums; }
.h-right .date { font-size:13px; color:var(--muted); font-weight:600; letter-spacing:1px; }

/* Break advance-notice bar */
.break-notice { align-items:center; justify-content:center; gap:10px; background:#fffbeb; color:#b45309; border-bottom:1px solid #fde68a; font-size:18px; font-weight:800; letter-spacing:1px; padding:8px 16px; }
.break-notice i { font-size:20px; }

/* Break overlay */
.break-screen { position:fixed; inset:70px 0 0 0; background:var(--bg); z-index:60; display:none; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:30px; }
.break-screen.show { display:flex; }
.break-screen .bk-icon { width:130px; height:130px; border-radius:50%; background:linear-gradient(135deg,var(--brand),var(--brand2)); color:#fff; display:flex; align-items:center; justify-content:center; font-size:64px; }
.break-screen h2 { font-size:54px; font-weight:900; margin-top:28px; color:var(--text); }
.break-screen .bk-msg { font-size:26px; color:var(--muted); font-weight:600; margin-top:10px; }
.break-screen .bk-until { font-size:34px; font-weight:800; color:var(--brand); margin-top:22px; }
.break-screen .bk-clock { font-size:80px; font-weight:900; margin-top:24px; color:var(--text); font-variant-numeric:tabular-nums; }
/* Announcement enable toggle */
.sound-toggle { position:fixed; bottom:18px; left:18px; z-index:70; display:inline-flex; align-items:center; gap:8px; padding:10px 16px; border-radius:999px; border:1px solid var(--border); background:var(--panel); color:var(--muted); font-family:inherit; font-size:15px; font-weight:700; cursor:pointer; box-shadow:0 4px 14px rgba(0,0,0,.08); }
.sound-toggle.on { background:linear-gradient(135deg,var(--brand),var(--brand2)); color:#fff; border-color:transparent; }
.sound-toggle i { font-size:18px; }

/* Main */
.main { height:calc(100vh - 70px); display:flex; }
.left { width:75%; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px; position:relative; }
/* single counter: one centered block (default look) */
.left.single .serve-block { display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
/* multiple counters: side-by-side cards */
.left.multi { flex-direction:row; flex-wrap:wrap; gap:24px; align-items:stretch; justify-content:center; overflow:auto; }
.left.multi .serve-block { flex:1 1 0; min-width:320px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; background:var(--panel); border:1px solid var(--border); border-radius:28px; padding:34px 26px; }
.left.multi .now-lbl { font-size:18px; letter-spacing:4px; }
.left.multi .big-token { font-size:clamp(80px,11vw,150px); }
.left.multi .pname { font-size:28px; }
.serve-block.pop { animation: slideUp .45s ease; }
.serve-block.brk { background:transparent; border-color:transparent; }
.left.multi .serve-block.brk { background:var(--panel); border:1px solid var(--border); }
.bk-c-icon { width:96px; height:96px; border-radius:50%; background:linear-gradient(135deg,#f59e0b,#f97316); color:#fff; display:flex; align-items:center; justify-content:center; font-size:48px; margin-bottom:14px; }
.bk-c-title { font-size:clamp(48px,7vw,84px); font-weight:900; color:#b45309; line-height:1; }
.bk-c-dur { font-size:30px; font-weight:800; color:#b45309; margin-top:14px; background:#fffbeb; border:1px solid #fde68a; padding:6px 20px; border-radius:999px; display:inline-block; }
[data-theme="dark"] .bk-c-dur { background:#2a1a05; border-color:#713f12; }
.bk-c-msg { font-size:22px; color:var(--muted); font-weight:600; margin-top:12px; }
.bk-c-until { font-size:26px; font-weight:800; color:#b45309; margin-top:14px; }
.bk-soon { margin-top:18px; font-size:16px; font-weight:700; color:#b45309; background:#fffbeb; border:1px solid #fde68a; padding:6px 14px; border-radius:999px; display:inline-flex; align-items:center; gap:6px; }
.counter-lbl { margin-top:12px; font-size:26px; font-weight:800; color:var(--brand); display:inline-flex; align-items:center; gap:8px; }
.left.multi .counter-lbl { font-size:22px; }
.now-lbl { font-size:24px; font-weight:700; letter-spacing:6px; text-transform:uppercase; color:var(--muted); }
.big-token { font-size:clamp(140px,20vw,220px); font-weight:900; line-height:.95; letter-spacing:-2px; }
.big-token.has { background:linear-gradient(135deg,var(--brand),var(--brand2)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
.big-token.empty { color:var(--muted2); }
.big-token.anim { animation: slideUp .5s ease; }
.token-stage.flash { animation: brandFlash .4s; border-radius:30px; }
.token-stage { padding:10px 40px; }
.pname { font-size:36px; font-weight:800; margin-top:6px; text-align:center; }
.vip-badge { display:inline-flex; align-items:center; gap:6px; background:#f59e0b; color:#fff; font-size:22px; font-weight:800; padding:4px 16px; border-radius:999px; vertical-align:middle; margin-left:10px; }
.pmeta { margin-top:16px; display:flex; gap:18px; align-items:center; }
.proceed { margin-top:28px; display:flex; align-items:center; justify-content:center; gap:10px; font-size:20px; font-weight:700; color:var(--success); white-space:nowrap; }
.proceed .dot { width:14px; height:14px; border-radius:50%; background:var(--success); flex-shrink:0; animation: blink 1.1s infinite; }
.waiting-msg { margin-top:20px; font-size:22px; color:var(--muted); font-weight:600; }

/* Right — compact Up Next + stats (≈25% width) */
.right { width:25%; min-width:240px; border-left:1px solid var(--border); display:flex; flex-direction:column; background:var(--panel); }
.section-lbl { font-size:16px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--muted); padding:20px 22px 12px; display:flex; align-items:center; gap:8px; }
.upnext-list { flex:1; padding:0 18px; display:flex; flex-direction:column; gap:12px; overflow:hidden; }
.up-card {
  background:var(--panel2); border:1px solid var(--border); border-radius:16px;
  padding:14px 16px; display:flex; align-items:center; gap:14px; animation: slideUp .45s ease;
}
.up-card.first { border-color:var(--brand); box-shadow:0 0 0 1px var(--brand); }
.up-num { font-size:34px; font-weight:900; color:var(--brand); min-width:60px; }
.up-info { flex:1; min-width:0; }
.up-info .nm { font-size:20px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.up-empty { color:var(--muted2); font-size:17px; padding:24px 18px; text-align:center; font-weight:600; }

.stats { display:flex; flex-direction:column; border-top:1px solid var(--border); }
.stat { display:flex; align-items:center; justify-content:space-between; padding:13px 22px; border-bottom:1px solid var(--border); }
.stat:last-child { border-bottom:none; }
.stat .k { font-size:13px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); order:0; }
.stat .v { font-size:26px; font-weight:900; line-height:1; transition: color .3s; order:1; }
.stat .v.waiting { color:var(--warning); }
.stat .v.pending { color:var(--pending); }
.stat .v.done { color:var(--success); }

/* Idle */
.idle { position:fixed; inset:0; background:var(--bg); z-index:50; display:none; flex-direction:column; align-items:center; justify-content:center; }
.idle.show { display:flex; }
.idle .ring { width:120px; height:120px; border-radius:50%; border:4px solid var(--border); border-top-color:var(--brand); animation: spin 2.5s linear infinite; display:flex; align-items:center; justify-content:center; }
.idle .ring i { font-size:50px; color:var(--brand); }
.idle h2 { font-size:42px; font-weight:800; margin-top:30px; }
.idle .iclock { font-size:90px; font-weight:900; margin-top:10px; background:linear-gradient(135deg,var(--brand),var(--brand2)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; font-variant-numeric:tabular-nums; }
.idle .idate { font-size:20px; color:var(--muted); letter-spacing:2px; margin-top:6px; }
.idle .hint { position:absolute; bottom:40px; color:var(--muted2); font-size:16px; letter-spacing:2px; }

@media (prefers-reduced-motion: no-preference) {
  @keyframes slideUp { from { transform:translateY(24px); opacity:0; } to { transform:translateY(0); opacity:1; } }
  @keyframes brandFlash { 0% { background:rgba(8,145,178,.16); } 100% { background:transparent; } }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.25;} }
  @keyframes spin { to { transform:rotate(360deg); } }
  @keyframes pulseGlow { 0%,100%{filter:brightness(1);} 50%{filter:brightness(1.25);} }
  .big-token.has { animation: pulseGlow 2.4s ease-in-out infinite; }
}
</style>
</head>
<body>

<header>
  <div class="h-left"><div class="h-logo"><i class="ti ti-plane-tilt"></i></div><h1 id="hospName">Fly Dubai</h1></div>
  <div class="h-center">TOKEN DISPLAY SYSTEM</div>
  <div class="h-right"><div class="clock" id="clock">--:--:--</div><div class="date" id="date">—</div></div>
</header>

<div class="break-notice" id="breakNotice" style="display:none"></div>

<div class="main">
  <div class="left" id="serveArea"></div>

  <div class="right">
    <div class="section-lbl"><i class="ti ti-arrow-up-right"></i> Up Next</div>
    <div class="upnext-list" id="upnextList"></div>
    <div class="stats">
      <div class="stat"><div class="v waiting" id="sWaiting">0</div><div class="k">Waiting</div></div>
      <div class="stat"><div class="v pending" id="sPending">0</div><div class="k">Pending</div></div>
      <div class="stat"><div class="v done" id="sDone">0</div><div class="k">Done</div></div>
    </div>
  </div>
</div>

<!-- Voice announcement toggle (tap once to allow the browser to play sound) -->
<button id="soundToggle" class="sound-toggle"><i class="ti ti-volume-off"></i> Enable announcements</button>

<!-- BREAK overlay -->
<div class="break-screen" id="breakScreen">
  <div class="bk-icon"><i class="ti ti-coffee"></i></div>
  <h2>We're on a break</h2>
  <div class="bk-msg" id="bkMsg"></div>
  <div class="bk-until" id="bkUntil"></div>
  <div class="bk-clock" id="bkClock">--:--</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
const CONFIG = {
  hospitalName: "Fly Dubai",
  purposes: [
    { id:"it", label:"IT" },
    { id:"outlook", label:"Outlook Issue" },
    { id:"hardware", label:"Hardware Issues" },
    { id:"laptop", label:"Laptop Issues" },
    { id:"other", label:"Other Issues" }
  ],
  storageKey: "hospitalTokenData",
  broadcastChannel: "hospital-token-channel"
};

/* ---- Firebase: shared, always-free, real-time database ---- */
const FIREBASE_DB_URL = "https://flydubai-17161-default-rtdb.asia-southeast1.firebasedatabase.app";
firebase.initializeApp({ databaseURL: FIREBASE_DB_URL });
const stateRef = firebase.database().ref('state');
let curState = null;   // declared early: tick() calls updateBreak() on load
// Region-based: uses whatever timezone the device is set to
function localDay(){ return new Intl.DateTimeFormat('en-CA').format(new Date()); }
function toArr(v){ return Array.isArray(v) ? v : (v && typeof v === 'object' ? Object.keys(v).sort((a,b)=>a-b).map(k=>v[k]) : []); }
function toServingMap(v){ if(!v||typeof v!=='object') return {}; const o={}; if(Array.isArray(v)){ v.forEach((val,i)=>{ if(val!=null) o[i]=val; }); } else { Object.keys(v).forEach(k=>{ if(v[k]!=null) o[k]=v[k]; }); } return o; }
function normalize(s){
  if(!s || s.date !== localDay()) return { date:localDay(), seq:1, nextNormal:6, counters:1, tokens:[], queue:[], pending:[], vip:[], serving:{}, servedCount:0, hospitalName:(s&&s.hospitalName)||CONFIG.hospitalName };
  s.tokens=toArr(s.tokens); s.queue=toArr(s.queue); s.pending=toArr(s.pending); s.vip=toArr(s.vip);
  s.counters = s.counters || 1;
  s.serving = toServingMap(s.serving);
  if(s.currentToken!=null && Object.keys(s.serving).length===0) s.serving['1']=s.currentToken;
  s.hospitalName=s.hospitalName||CONFIG.hospitalName;
  s.breaks = toServingMap(s.breaks);   // per-counter break map
  Object.keys(s.breaks).forEach(k=>{ const b=s.breaks[k]; if(b&&typeof b==='object'){ b.on=!!b.on; b.enabled=!!b.enabled; } });
  s.tokens.forEach(t=>{ if(t.no==null) t.no=t.id; });
  const onCounter = new Set(Object.values(s.serving||{}).filter(v=>v!=null));
  s.tokens.forEach(t=>{ if(t.status==='serving' && !onCounter.has(t.id)){ t.status='waiting'; if(!s.queue.includes(t.id) && !(s.vip||[]).includes(t.id)){ if(t.isVip) s.vip.push(t.id); else s.queue.unshift(t.id); } } });
  return s;
}
const purposeLabel = id => (CONFIG.purposes.find(p=>p.id===id)||{label:id}).label;
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function pad(n){ return String(n).padStart(2,'0'); }
function fmtDur(ms){
  if(!(ms>0)) return 'less than a minute';
  const m = Math.round(ms/60000);
  if(m<1) return 'less than a minute';
  if(m<60) return m + (m===1?' minute':' minutes');
  const h=Math.floor(m/60), mm=m%60;
  return h + (h===1?' hr':' hrs') + (mm? ' '+mm+' min':'');
}

document.getElementById('hospName').textContent = CONFIG.hospitalName;

/* Clock */
function tick(){
  const d = new Date();
  document.getElementById('clock').textContent = d.toLocaleTimeString('en-US',{hour12:false});
  document.getElementById('date').textContent = d.toLocaleDateString('en-US',{weekday:'long',day:'numeric',month:'long',year:'numeric'}).toUpperCase();
  const bc = document.getElementById('bkClock'); if (bc) bc.textContent = d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true});
  updateBreak(); // re-evaluate scheduled break window each tick
}
tick(); setInterval(tick,1000);

/* ---- Break time (scheduled window + manual) ---- */
function to12h(t){ if(!t) return ''; const p=String(t).split(':'); let h=parseInt(p[0],10); const m=p[1]||'00'; const ap=h>=12?'PM':'AM'; h=h%12||12; return h+':'+m+' '+ap; }
// Human-readable break length from a from/to HH:MM window, e.g. "1 hr", "1 hr 30 min", "45 min".
function fmtBreakDur(from, to){
  if(!from || !to) return '';
  const [fh,fm]=from.split(':').map(Number), [th,tm]=to.split(':').map(Number);
  let mins=(th*60+tm)-(fh*60+fm); if(mins<=0) mins+=24*60; // handle overnight wrap
  const h=Math.floor(mins/60), m=mins%60;
  const parts=[]; if(h) parts.push(h+' hr'); if(m) parts.push(m+' min');
  return parts.join(' ');
}
function inWindow(b, now){
  if(!b.enabled || !b.from || !b.to) return false;
  const cur = now.getHours()*60 + now.getMinutes();
  const [fh,fm]=b.from.split(':').map(Number), [th,tm]=b.to.split(':').map(Number);
  const f=fh*60+fm, t=th*60+tm;
  return f<=t ? (cur>=f && cur<t) : (cur>=f || cur<t);
}
function breakOn(b, now){ return !!(b && (b.on || inWindow(b, now))); }
function breakSig(s){
  const now=new Date(); const n=s.counters||1; let sig='';
  for(let c=1;c<=n;c++){ sig += breakOn((s.breaks||{})[String(c)]||{}, now) ? '1':'0'; }
  return sig;
}
function updateBreak(){ if(curState){ const sig=breakSig(curState); if(sig!==lastBreakSig) renderServe(curState); } }

/* ---- Voice announcements (browser text-to-speech; free, offline) ---- */
let announceOn = localStorage.getItem('announceOn')==='1';
let announcedInit = false;   // don't announce tokens already being served on first load
let audioCtx;
function beep(){
  try{
    audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
    [880,1175].forEach((f,i)=>{
      const o=audioCtx.createOscillator(), g=audioCtx.createGain();
      o.type='sine'; o.frequency.value=f; o.connect(g); g.connect(audioCtx.destination);
      const t=audioCtx.currentTime+i*0.16;
      g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.25,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+0.15);
      o.start(t); o.stop(t+0.16);
    });
  }catch(e){}
}
function speak(text){
  try{ const u=new SpeechSynthesisUtterance(text); u.rate=0.95; u.pitch=1; u.lang='en-US'; speechSynthesis.speak(u); }catch(e){}
}
function announceToken(t, c, n){
  if(!announceOn) return;
  const who = t.isVip ? ('V I P number '+t.vipNo) : ('Token number '+t.no);
  const where = n>1 ? ('counter '+c) : 'the counter';
  beep();
  setTimeout(()=>speak(who+', please proceed to '+where), 380);
}
const soundToggle=document.getElementById('soundToggle');
function updateSoundBtn(){
  soundToggle.classList.toggle('on', announceOn);
  soundToggle.innerHTML = announceOn ? '<i class="ti ti-volume"></i> Announcements on' : '<i class="ti ti-volume-off"></i> Enable announcements';
}
soundToggle.onclick = () => {
  announceOn = !announceOn;
  localStorage.setItem('announceOn', announceOn?'1':'0');
  updateSoundBtn();
  if(announceOn){ beep(); speak('Announcements enabled'); }  // unlock audio within this tap
};
updateSoundBtn();

/* State comes from the shared server */
let lastServing = {};
let lastBreakSig = '';
function renderServe(s){
  const n = s.counters || 1;
  const now = new Date();
  const area = document.getElementById('serveArea');
  area.className = 'left ' + (n>1 ? 'multi' : 'single');
  let html = '';
  const toAnnounce = [];
  for (let c=1; c<=n; c++){
    const b = (s.breaks||{})[String(c)] || {};
    if (breakOn(b, now)){
      html += `<div class="serve-block brk">
        <div class="bk-c-icon"><i class="ti ti-coffee"></i></div>
        <div class="now-lbl">${n>1?('Counter '+c):''}</div>
        <div class="bk-c-title">On Break</div>
        ${fmtBreakDur(b.from,b.to)?`<div class="bk-c-dur">Break time: ${fmtBreakDur(b.from,b.to)}</div>`:''}
        <div class="bk-c-msg">Service will resume shortly</div>
        ${b.to?`<div class="bk-c-until">Back at ${to12h(b.to)}</div>`:''}
      </div>`;
      lastServing[c] = '_brk';
      continue;
    }
    const note = (b.enabled && b.from && b.to) ? `<div class="bk-soon"><i class="ti ti-coffee"></i> Break time: ${fmtBreakDur(b.from,b.to)} · ${to12h(b.from)} – ${to12h(b.to)}</div>` : '';
    const id = s.serving ? s.serving[String(c)] : null;
    const t = (id!=null) ? s.tokens.find(x=>x.id===id) : null;
    const changed = lastServing[c] !== id;
    if (t){
      if(changed && id!=null) toAnnounce.push({t, c});
      html += `<div class="serve-block ${changed?'pop':''}">
        <div class="now-lbl">Now Serving${n>1?' · Counter '+c:''}</div>
        <div class="token-stage"><div class="big-token has">${pad(t.isVip ? t.vipNo : t.no)}</div></div>
        <div class="pname">${esc(t.name)}</div>
        ${n>1?`<div class="counter-lbl"><i class="ti ti-building-store"></i> Counter ${c}</div>`:''}
        <div class="proceed"><span class="dot"></span> Proceed to ${n>1?('Counter '+c):'counter'}</div>
        ${note}
      </div>`;
    } else {
      html += `<div class="serve-block">
        <div class="now-lbl">Now Serving${n>1?' · Counter '+c:''}</div>
        <div class="token-stage"><div class="big-token empty">00</div></div>
        <div class="waiting-msg">Waiting for next call…</div>
        ${note}
      </div>`;
    }
    lastServing[c] = id;
  }
  area.innerHTML = html;
  lastBreakSig = breakSig(s);
  if(announcedInit){ toAnnounce.forEach((a,i)=> setTimeout(()=>announceToken(a.t, a.c, n), i*2200)); }
  announcedInit = true;
}
function render(s){
  if (!s) return;
  curState = s;
  renderServe(s);

  // up next (3)
  const list = document.getElementById('upnextList');
  const upcoming = s.queue.slice(0,3);
  if (!upcoming.length) list.innerHTML = `<div class="up-empty">No one waiting</div>`;
  else list.innerHTML = upcoming.map((id,i)=>{
    const t = s.tokens.find(x=>x.id===id);
    return `<div class="up-card ${i===0?'first':''}">
      <div class="up-num">${pad(t.no)}</div>
      <div class="up-info"><div class="nm">${esc(t.name)}</div></div>
    </div>`;
  }).join('');

  document.getElementById('sWaiting').textContent = s.tokens.filter(t=>t.status==='waiting').length;
  document.getElementById('sPending').textContent = s.pending.length;
  document.getElementById('sDone').textContent = s.tokens.filter(t=>t.status==='done').length;

  const name = s.hospitalName || CONFIG.hospitalName;
  document.getElementById('hospName').textContent = name;
}

/* Keep the screen awake 24/7 — never sleep (re-acquire if the OS releases it) */
let wakeLock = null;
async function keepAwake(){
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => { wakeLock = null; });
    }
  } catch(e){ /* ignore — falls back to OS settings */ }
}
document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') keepAwake(); });
keepAwake();
// Re-try periodically in case the lock was dropped
setInterval(() => { if (wakeLock === null) keepAwake(); }, 30000);

/* Live updates straight from Firebase — instant, no polling */
stateRef.on('value', snap => render(normalize(snap.val())));
</script>
