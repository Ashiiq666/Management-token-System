<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Token Display — Fly Dubai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
:root {
  --brand: #22d3ee; --brand2: #38bdf8;
  --bg: #050d1a; --panel: #0d1a2e; --panel2: #111f36;
  --border: #1e3050; --text: #f1f5f9; --muted: #7e91ad; --muted2: #5a6e8c;
  --success: #4ade80; --warning: #fbbf24; --danger: #f87171; --pending: #a78bfa;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text);
  width:100vw; height:100vh; -webkit-font-smoothing:antialiased; user-select:none;
}
.badge { display:inline-flex; align-items:center; gap:7px; padding:6px 16px; border-radius:999px; font-size:20px; font-weight:700; }
.badge.it { background:rgba(56,189,248,.16); color:#7dd3fc; }
.badge.outlook { background:rgba(74,222,128,.16); color:var(--success); }
.badge.hardware { background:rgba(251,191,36,.16); color:var(--warning); }
.badge.laptop { background:rgba(167,139,250,.16); color:var(--pending); }
.badge.other { background:rgba(148,163,184,.16); color:#cbd5e1; }

/* Header */
header {
  height:70px; display:flex; align-items:center; justify-content:space-between;
  padding:0 36px; border-bottom:1px solid var(--border); background:var(--panel);
}
.h-left { display:flex; align-items:center; gap:14px; }
.h-logo { width:44px; height:44px; border-radius:50%; background:linear-gradient(135deg,var(--brand),var(--brand2)); color:#04141a; display:flex; align-items:center; justify-content:center; font-size:24px; }
.h-left h1 { font-size:22px; font-weight:800; }
.h-center { font-size:20px; font-weight:800; letter-spacing:4px; color:var(--brand); }
.h-right { text-align:right; }
.h-right .clock { font-size:26px; font-weight:800; font-variant-numeric:tabular-nums; }
.h-right .date { font-size:13px; color:var(--muted); font-weight:600; letter-spacing:1px; }

/* Main */
.main { height:calc(100vh - 70px); display:flex; }
.left { width:60%; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px; position:relative; }
.now-lbl { font-size:24px; font-weight:700; letter-spacing:6px; text-transform:uppercase; color:var(--muted); }
.big-token { font-size:clamp(140px,20vw,220px); font-weight:900; line-height:.95; letter-spacing:-2px; }
.big-token.has { background:linear-gradient(135deg,var(--brand),var(--brand2)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
.big-token.empty { color:var(--muted2); }
.big-token.anim { animation: slideUp .5s ease; }
.token-stage.flash { animation: brandFlash .4s; border-radius:30px; }
.token-stage { padding:10px 40px; }
.pname { font-size:36px; font-weight:800; margin-top:6px; text-align:center; }
.pmeta { margin-top:16px; display:flex; gap:18px; align-items:center; }
.proceed { margin-top:34px; display:flex; align-items:center; gap:12px; font-size:24px; font-weight:700; color:var(--success); }
.proceed .dot { width:16px; height:16px; border-radius:50%; background:var(--success); animation: blink 1.1s infinite; }
.waiting-msg { margin-top:20px; font-size:24px; color:var(--muted); font-weight:600; }

/* Right */
.right { width:40%; border-left:1px solid var(--border); display:flex; flex-direction:column; background:var(--panel); }
.section-lbl { font-size:18px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--muted); padding:24px 30px 14px; display:flex; align-items:center; gap:10px; }
.upnext-list { flex:1; padding:0 24px; display:flex; flex-direction:column; gap:14px; overflow:hidden; }
.up-card {
  background:var(--panel2); border:1px solid var(--border); border-radius:18px;
  padding:18px 22px; display:flex; align-items:center; gap:20px; animation: slideUp .45s ease;
}
.up-card.first { border-color:var(--brand); box-shadow:0 0 0 1px var(--brand); }
.up-num { font-size:46px; font-weight:900; color:var(--brand); min-width:90px; }
.up-info { flex:1; min-width:0; }
.up-info .nm { font-size:26px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.up-empty { color:var(--muted2); font-size:20px; padding:30px; text-align:center; font-weight:600; }

.stats { display:grid; grid-template-columns:repeat(3,1fr); border-top:1px solid var(--border); }
.stat { padding:22px 12px; text-align:center; border-right:1px solid var(--border); }
.stat:last-child { border-right:none; }
.stat .v { font-size:46px; font-weight:900; line-height:1; transition: color .3s; }
.stat .v.waiting { color:var(--warning); }
.stat .v.pending { color:var(--pending); }
.stat .v.done { color:var(--success); }
.stat .k { font-size:15px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-top:8px; }

/* Idle */
.idle { position:fixed; inset:0; background:var(--bg); z-index:50; display:none; flex-direction:column; align-items:center; justify-content:center; }
.idle.show { display:flex; }
.idle .ring { width:120px; height:120px; border-radius:50%; border:4px solid var(--border); border-top-color:var(--brand); animation: spin 2.5s linear infinite; display:flex; align-items:center; justify-content:center; }
.idle .ring i { font-size:50px; color:var(--brand); }
.idle h2 { font-size:42px; font-weight:800; margin-top:30px; }
.idle .iclock { font-size:90px; font-weight:900; margin-top:10px; background:linear-gradient(135deg,var(--brand),var(--brand2)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; font-variant-numeric:tabular-nums; }
.idle .idate { font-size:20px; color:var(--muted); letter-spacing:2px; margin-top:6px; }
.idle .hint { position:absolute; bottom:40px; color:var(--muted2); font-size:16px; letter-spacing:2px; }

@media (prefers-reduced-motion: no-preference) {
  @keyframes slideUp { from { transform:translateY(24px); opacity:0; } to { transform:translateY(0); opacity:1; } }
  @keyframes brandFlash { 0% { background:rgba(34,211,238,.22); } 100% { background:transparent; } }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.25;} }
  @keyframes spin { to { transform:rotate(360deg); } }
  @keyframes pulseGlow { 0%,100%{filter:brightness(1);} 50%{filter:brightness(1.25);} }
  .big-token.has { animation: pulseGlow 2.4s ease-in-out infinite; }
}
</style>
</head>
<body>

<header>
  <div class="h-left"><div class="h-logo"><i class="ti ti-plane-tilt"></i></div><h1 id="hospName">Fly Dubai</h1></div>
  <div class="h-center">TOKEN DISPLAY SYSTEM</div>
  <div class="h-right"><div class="clock" id="clock">--:--:--</div><div class="date" id="date">—</div></div>
</header>

<div class="main">
  <div class="left">
    <div class="now-lbl">Now Serving</div>
    <div class="token-stage" id="tokenStage">
      <div class="big-token empty" id="bigToken">—</div>
    </div>
    <div id="patientArea">
      <div class="waiting-msg" id="waitingMsg">Waiting for next call…</div>
    </div>
  </div>

  <div class="right">
    <div class="section-lbl"><i class="ti ti-arrow-up-right"></i> Up Next</div>
    <div class="upnext-list" id="upnextList"></div>
    <div class="stats">
      <div class="stat"><div class="v waiting" id="sWaiting">0</div><div class="k">Waiting</div></div>
      <div class="stat"><div class="v pending" id="sPending">0</div><div class="k">Pending</div></div>
      <div class="stat"><div class="v done" id="sDone">0</div><div class="k">Done</div></div>
    </div>
  </div>
</div>

<script>
const CONFIG = {
  hospitalName: "Fly Dubai",
  purposes: [
    { id:"it", label:"IT" },
    { id:"outlook", label:"Outlook Issue" },
    { id:"hardware", label:"Hardware Issues" },
    { id:"laptop", label:"Laptop Issues" },
    { id:"other", label:"Other Issues" }
  ],
  storageKey: "hospitalTokenData",
  broadcastChannel: "hospital-token-channel"
};

/* ---- Firebase: shared, always-free, real-time database ---- */
const FIREBASE_DB_URL = "https://flydubai-17161-default-rtdb.asia-southeast1.firebasedatabase.app";
firebase.initializeApp({ databaseURL: FIREBASE_DB_URL });
const stateRef = firebase.database().ref('state');
// Region-based: uses whatever timezone the device is set to
function localDay(){ return new Intl.DateTimeFormat('en-CA').format(new Date()); }
function toArr(v){ return Array.isArray(v) ? v : (v && typeof v === 'object' ? Object.keys(v).sort((a,b)=>a-b).map(k=>v[k]) : []); }
function normalize(s){
  if(!s || s.date !== localDay()) return { date:localDay(), nextId:1, tokens:[], queue:[], pending:[], currentToken:null, servedCount:0, hospitalName:(s&&s.hospitalName)||CONFIG.hospitalName };
  s.tokens=toArr(s.tokens); s.queue=toArr(s.queue); s.pending=toArr(s.pending);
  if(s.currentToken===undefined) s.currentToken=null;
  s.hospitalName=s.hospitalName||CONFIG.hospitalName;
  return s;
}
const purposeLabel = id => (CONFIG.purposes.find(p=>p.id===id)||{label:id}).label;
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function pad(n){ return String(n).padStart(2,'0'); }

document.getElementById('hospName').textContent = CONFIG.hospitalName;

/* Clock */
function tick(){
  const d = new Date();
  document.getElementById('clock').textContent = d.toLocaleTimeString('en-US',{hour12:false});
  document.getElementById('date').textContent = d.toLocaleDateString('en-US',{weekday:'long',day:'numeric',month:'long',year:'numeric'}).toUpperCase();
}
tick(); setInterval(tick,1000);

/* State comes from the shared server */
let lastToken = null;
function render(s){
  if (!s) return;
  const big = document.getElementById('bigToken');
  const stage = document.getElementById('tokenStage');
  const pArea = document.getElementById('patientArea');

  if (s.currentToken != null){
    const t = s.tokens.find(x=>x.id===s.currentToken);
    if (t){
      big.textContent = pad(t.id);
      big.className = 'big-token has';
      if (s.currentToken !== lastToken){
        big.classList.remove('anim'); void big.offsetWidth; big.classList.add('anim');
        stage.classList.remove('flash'); void stage.offsetWidth; stage.classList.add('flash');
      }
      pArea.innerHTML = `<div class="pname">${esc(t.name)}</div>
        <div class="proceed"><span class="dot"></span> Please proceed to counter</div>`;
    }
  } else {
    big.textContent = '—'; big.className = 'big-token empty';
    pArea.innerHTML = `<div class="waiting-msg">Waiting for next call…</div>`;
  }
  lastToken = s.currentToken;

  // up next (3)
  const list = document.getElementById('upnextList');
  const upcoming = s.queue.slice(0,3);
  if (!upcoming.length) list.innerHTML = `<div class="up-empty">No one waiting</div>`;
  else list.innerHTML = upcoming.map((id,i)=>{
    const t = s.tokens.find(x=>x.id===id);
    return `<div class="up-card ${i===0?'first':''}">
      <div class="up-num">${pad(t.id)}</div>
      <div class="up-info"><div class="nm">${esc(t.name)}</div></div>
    </div>`;
  }).join('');

  document.getElementById('sWaiting').textContent = s.tokens.filter(t=>t.status==='waiting').length;
  document.getElementById('sPending').textContent = s.pending.length;
  document.getElementById('sDone').textContent = s.tokens.filter(t=>t.status==='done').length;

  const name = s.hospitalName || CONFIG.hospitalName;
  document.getElementById('hospName').textContent = name;
}

/* Keep the screen awake 24/7 — never sleep (re-acquire if the OS releases it) */
let wakeLock = null;
async function keepAwake(){
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => { wakeLock = null; });
    }
  } catch(e){ /* ignore — falls back to OS settings */ }
}
document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') keepAwake(); });
keepAwake();
// Re-try periodically in case the lock was dropped
setInterval(() => { if (wakeLock === null) keepAwake(); }, 30000);

/* Live updates straight from Firebase — instant, no polling */
stateRef.on('value', snap => render(normalize(snap.val())));
</script>
</body>
</html>
